<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your account with our secure and premium glassmorphic authentication system powered by Firebase.">
  <title>Sign In - Secure Portal</title>
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
</head>
<body>

  <!-- Background Orbs -->
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <!-- Main Login Card -->
  <main class="auth-container">
    <header class="auth-header">
      <h1 id="page-title">Welcome Back</h1>
      <p>Enter your credentials to access your account</p>
    </header>

    <form id="login-form" novalidate>
      <!-- Email Field -->
      <div class="form-group">
        <label for="email" class="form-label">EMAIL ADDRESS</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </span>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-control" 
            placeholder="name@example.com" 
            required 
            autocomplete="email"
          >
        </div>
        <div id="email-error" class="validation-hint">Please enter a valid email address.</div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password" class="form-label">PASSWORD</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-control" 
            placeholder="••••••••" 
            required 
            autocomplete="current-password"
            style="padding-right: 44px;"
          >
          <button 
            type="button" 
            id="toggle-password" 
            style="position: absolute; right: 12px; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center;"
            title="Toggle password visibility"
          >
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div id="password-error" class="validation-hint">Password is required.</div>
      </div>

      <!-- Form Options -->
      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox" id="remember-me">
          Remember me
        </label>
        <a href="#" class="auth-link" id="forgot-password-link">Forgot password?</a>
      </div>

      <!-- Submit Button -->
      <button type="submit" id="btn-login" class="btn-submit">
        <span>Sign In</span>
        <div class="spinner" id="login-spinner"></div>
      </button>
    </form>

    <!-- Navigation Switch -->
    <div class="auth-switch">
      Don't have an account? <a href="register.html" class="auth-link">Sign up</a>
    </div>
  </main>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Firebase Script Integration -->
  <script type="module">
    import { auth } from './firebase.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "firebase/auth";

    const loginForm = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const btnLogin = document.getElementById('btn-login');
    const loginSpinner = document.getElementById('login-spinner');
    const togglePasswordBtn = document.getElementById('toggle-password');
    const eyeIcon = document.getElementById('eye-icon');
    const toastContainer = document.getElementById('toast-container');
    const forgotPasswordLink = document.getElementById('forgot-password-link');

    // Redirect to dashboard (logout.html) if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'logout.html';
      }
    });

    // Toggle Password Visibility
    togglePasswordBtn.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        // Eye off icon
        eyeIcon.innerHTML = `<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>`;
      } else {
        passwordInput.type = 'password';
        // Eye icon
        eyeIcon.innerHTML = `<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/>`;
      }
    });

    // Helper for Toast Notifications
    function showToast(message, type = 'error') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <span class="toast-icon">
          ${type === 'success' 
            ? '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
            : '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>'
          }
        </span>
        <span class="toast-message">${message}</span>
      `;
      toastContainer.appendChild(toast);

      // Auto remove toast
      setTimeout(() => {
        toast.style.transform = 'translateX(120%)';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    forgotPasswordLink.addEventListener('click', (e) => {
      e.preventDefault();
      showToast('Password reset functionality requires configuration setup.', 'info');
    });

    // Form Submission and Client-side Validation
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      let isValid = true;
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Reset error displays
      document.getElementById('email-error').style.display = 'none';
      document.getElementById('password-error').style.display = 'none';

      // Check email
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !emailRegex.test(email)) {
        document.getElementById('email-error').style.display = 'block';
        isValid = false;
      }

      // Check password
      if (!password) {
        document.getElementById('password-error').style.display = 'block';
        isValid = false;
      }

      if (!isValid) return;

      // Trigger Loading UI
      btnLogin.disabled = true;
      loginSpinner.style.display = 'block';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast('Logged in successfully!', 'success');
        // Redirection happens via onAuthStateChanged listener
      } catch (error) {
        let errorMsg = 'Failed to sign in. Please verify your credentials.';
        
        // Custom user-friendly messages for standard Firebase Auth errors
        switch (error.code) {
          case 'auth/invalid-credential':
          case 'auth/wrong-password':
          case 'auth/user-not-found':
            errorMsg = 'Incorrect email or password.';
            break;
          case 'auth/invalid-email':
            errorMsg = 'Please enter a valid email address.';
            break;
          case 'auth/user-disabled':
            errorMsg = 'This account has been disabled.';
            break;
          case 'auth/too-many-requests':
            errorMsg = 'Too many failed login attempts. Please try again later.';
            break;
          case 'auth/network-request-failed':
            errorMsg = 'Network connection failed. Please check your network or Firebase configuration.';
            break;
          default:
            // If it's the default "YOUR_API_KEY" placeholder
            if (auth.config.apiKey === 'YOUR_API_KEY') {
              errorMsg = 'Firebase has not been configured yet. Please configure firebase.js with your project credentials.';
            } else {
              errorMsg = error.message;
            }
        }
        showToast(errorMsg, 'error');
      } finally {
        btnLogin.disabled = false;
        loginSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
