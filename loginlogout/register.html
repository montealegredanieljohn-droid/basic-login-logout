<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a new account with our secure and premium glassmorphic registration system powered by Firebase.">
  <title>Sign Up - Secure Portal</title>
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
      }
    }
  </script>
</head>
<body>

  <!-- Background Orbs -->
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <!-- Main Register Card -->
  <main class="auth-container">
    <header class="auth-header">
      <h1 id="page-title">Create Account</h1>
      <p>Sign up to get access to all features</p>
    </header>

    <form id="register-form" novalidate>
      <!-- Full Name Field -->
      <div class="form-group">
        <label for="fullname" class="form-label">FULL NAME</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input 
            type="text" 
            id="fullname" 
            name="fullname" 
            class="form-control" 
            placeholder="John Doe" 
            required 
            autocomplete="name"
          >
        </div>
        <div id="fullname-error" class="validation-hint">Please enter your full name.</div>
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label for="email" class="form-label">EMAIL ADDRESS</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </span>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-control" 
            placeholder="name@example.com" 
            required 
            autocomplete="email"
          >
        </div>
        <div id="email-error" class="validation-hint">Please enter a valid email address.</div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password" class="form-label">PASSWORD</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-control" 
            placeholder="••••••••" 
            required 
            autocomplete="new-password"
          >
        </div>
        <div id="password-error" class="validation-hint">Password must be at least 6 characters.</div>
      </div>

      <!-- Confirm Password Field -->
      <div class="form-group">
        <label for="confirm-password" class="form-label">CONFIRM PASSWORD</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input 
            type="password" 
            id="confirm-password" 
            name="confirm-password" 
            class="form-control" 
            placeholder="••••••••" 
            required 
            autocomplete="new-password"
          >
        </div>
        <div id="confirm-error" class="validation-hint">Passwords do not match.</div>
      </div>

      <!-- Submit Button -->
      <button type="submit" id="btn-register" class="btn-submit">
        <span>Sign Up</span>
        <div class="spinner" id="register-spinner"></div>
      </button>
    </form>

    <!-- Navigation Switch -->
    <div class="auth-switch">
      Already have an account? <a href="login.html" class="auth-link">Sign in</a>
    </div>
  </main>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Firebase Script Integration -->
  <script type="module">
    import { auth } from './firebase.js';
    import { createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "firebase/auth";

    const registerForm = document.getElementById('register-form');
    const fullnameInput = document.getElementById('fullname');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm-password');
    const btnRegister = document.getElementById('btn-register');
    const registerSpinner = document.getElementById('register-spinner');
    const toastContainer = document.getElementById('toast-container');

    // Redirect to dashboard (logout.html) if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user && user.displayName) { // wait for display name update before redirecting if we are registering
        window.location.href = 'logout.html';
      }
    });

    // Helper for Toast Notifications
    function showToast(message, type = 'error') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <span class="toast-icon">
          ${type === 'success' 
            ? '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
            : '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>'
          }
        </span>
        <span class="toast-message">${message}</span>
      `;
      toastContainer.appendChild(toast);

      // Auto remove toast
      setTimeout(() => {
        toast.style.transform = 'translateX(120%)';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Form Submission and Validation
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      let isValid = true;
      const fullname = fullnameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;

      // Reset errors
      document.getElementById('fullname-error').style.display = 'none';
      document.getElementById('email-error').style.display = 'none';
      document.getElementById('password-error').style.display = 'none';
      document.getElementById('confirm-error').style.display = 'none';

      // Validate name
      if (!fullname) {
        document.getElementById('fullname-error').style.display = 'block';
        isValid = false;
      }

      // Validate email
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !emailRegex.test(email)) {
        document.getElementById('email-error').style.display = 'block';
        isValid = false;
      }

      // Validate password
      if (!password || password.length < 6) {
        document.getElementById('password-error').style.display = 'block';
        isValid = false;
      }

      // Validate confirm password
      if (password !== confirmPassword) {
        document.getElementById('confirm-error').style.display = 'block';
        isValid = false;
      }

      if (!isValid) return;

      // Trigger Loading UI
      btnRegister.disabled = true;
      registerSpinner.style.display = 'block';

      try {
        // Create the user
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        
        // Update user profile display name
        await updateProfile(userCredential.user, {
          displayName: fullname
        });
        
        showToast('Registration successful! Redirecting...', 'success');
        
        // Force redirect to dashboard in case onAuthStateChanged is slow/already fired
        setTimeout(() => {
          window.location.href = 'logout.html';
        }, 1000);
      } catch (error) {
        let errorMsg = 'Failed to create an account. Please try again.';
        
        switch (error.code) {
          case 'auth/email-already-in-use':
            errorMsg = 'This email is already in use by another account.';
            break;
          case 'auth/invalid-email':
            errorMsg = 'Please enter a valid email address.';
            break;
          case 'auth/weak-password':
            errorMsg = 'The password is too weak. Must be at least 6 characters.';
            break;
          case 'auth/operation-not-allowed':
            errorMsg = 'Email/Password authentication is not enabled in Firebase Console.';
            break;
          case 'auth/network-request-failed':
            errorMsg = 'Network connection error. Check your configuration.';
            break;
          default:
            if (auth.config.apiKey === 'YOUR_API_KEY') {
              errorMsg = 'Firebase has not been configured yet. Please configure firebase.js with your project credentials.';
            } else {
              errorMsg = error.message;
            }
        }
        showToast(errorMsg, 'error');
      } finally {
        btnRegister.disabled = false;
        registerSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
